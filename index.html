<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WPP Automator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --green: #25d366;
      --text: #e8e8e8;
      --muted: #666;
      --danger: #e05555;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    header { border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Space Mono', monospace; font-size: 1.1rem; color: var(--green); letter-spacing: 2px; text-transform: uppercase; }
    .status-badge { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--muted); font-family: 'Space Mono', monospace; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: background 0.4s; }
    .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .qr-banner { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: 8px; padding: 20px 24px; margin-bottom: 32px; display: none; align-items: center; gap: 16px; }
    .qr-banner.visible { display: flex; }
    .qr-icon { font-size: 2rem; }
    .qr-text h3 { font-size: 0.95rem; margin-bottom: 4px; }
    .qr-text p { font-size: 0.8rem; color: var(--muted); }
    .qr-btn { margin-left: auto; background: var(--green); color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-family: 'Space Mono', monospace; font-size: 0.75rem; cursor: pointer; font-weight: 700; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
    .card h2 { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 20px; }
    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; margin-top: 14px; text-transform: uppercase; letter-spacing: 1px; }
    input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: var(--green); }
    textarea { resize: vertical; min-height: 80px; }
    .btn { width: 100%; margin-top: 20px; padding: 12px; border: none; border-radius: 8px; font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-green { background: var(--green); color: #000; }
    .btn-outline { background: transparent; border: 1px solid var(--green); color: var(--green); }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--green); padding: 12px 20px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-left-color: var(--danger); }
    .jobs-section { margin-top: 8px; }
    .jobs-section h2 { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 16px; }
    .job-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .job-info { flex: 1; }
    .job-phone { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--green); }
    .job-msg { font-size: 0.85rem; margin: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
    .job-time { font-size: 0.75rem; color: var(--muted); }
    .delete-btn { background: transparent; border: 1px solid var(--border); color: var(--danger); padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'Space Mono', monospace; transition: border-color 0.2s; }
    .delete-btn:hover { border-color: var(--danger); }
    .empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 24px; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.visible { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; max-width: 340px; width: 90%; }
    .modal h3 { font-family: 'Space Mono', monospace; color: var(--green); margin-bottom: 8px; font-size: 0.9rem; }
    .modal p { color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; }
    #qr-container { background: white; padding: 16px; border-radius: 8px; display: inline-block; }
    .modal-close { margin-top: 20px; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 6px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 0.75rem; }
  </style>
</head>
<body>
<header>
  <div class="logo">WPP_Automator</div>
  <div class="status-badge">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Checking...</span>
  </div>
</header>
<div class="container">
  <div class="qr-banner" id="qr-banner">
    <div class="qr-icon">📱</div>
    <div class="qr-text">
      <h3>WhatsApp not connected</h3>
      <p>Scan the QR code to link your account</p>
    </div>
    <button class="qr-btn" onclick="showQR()">SCAN QR</button>
  </div>
  <div class="grid">
    <div class="card">
      <h2>Send Now</h2>
      <label>Phone Number</label>
      <input type="text" id="send-phone" placeholder="+1 555 000 0000" />
      <label>Message</label>
      <textarea id="send-msg" placeholder="Type your message..."></textarea>
      <button class="btn btn-green" onclick="sendNow()">SEND MESSAGE</button>
    </div>
    <div class="card">
      <h2>Schedule Message</h2>
      <label>Phone Number</label>
      <input type="text" id="sched-phone" placeholder="+1 555 000 0000" />
      <label>Message</label>
      <textarea id="sched-msg" placeholder="Type your message..."></textarea>
      <label>Send At</label>
      <input type="datetime-local" id="sched-time" />
      <button class="btn btn-outline" onclick="scheduleMsg()">SCHEDULE</button>
    </div>
  </div>
  <div class="jobs-section">
    <h2>Scheduled Messages</h2>
    <div id="jobs-list"><div class="empty">No scheduled messages</div></div>
  </div>
</div>
<div class="modal-overlay" id="qr-modal">
  <div class="modal">
    <h3>Scan with WhatsApp</h3>
    <p>Open WhatsApp → Linked Devices → Link a Device</p>
    <div id="qr-container"><p style="color:#000;font-size:0.8rem">Loading QR...</p></div>
    <button class="modal-close" onclick="closeQR()">CLOSE</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (error ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }
  async function checkStatus() {
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      const dot = document.getElementById('status-dot');
      const txt = document.getElementById('status-text');
      const banner = document.getElementById('qr-banner');
      if (data.ready) {
        dot.className = 'dot online';
        txt.textContent = 'Connected';
        banner.classList.remove('visible');
      } else {
        dot.className = 'dot';
        txt.textContent = 'Disconnected';
        banner.classList.add('visible');
      }
    } catch { document.getElementById('status-text').textContent = 'Bridge Offline'; }
  }
  async function showQR() {
    document.getElementById('qr-modal').classList.add('visible');
    const res = await fetch('/api/status');
    const data = await res.json();
    const container = document.getElementById('qr-container');
    container.innerHTML = '';
    if (data.qr) {
      new QRCode(container, { text: data.qr, width: 200, height: 200 });
    } else {
      container.innerHTML = '<p style="color:#000;padding:20px">No QR available.<br>Check terminal for QR code.</p>';
    }
  }
  function closeQR() { document.getElementById('qr-modal').classList.remove('visible'); }
  async function sendNow() {
    const phone = document.getElementById('send-phone').value.trim();
    const message = document.getElementById('send-msg').value.trim();
    if (!phone || !message) return showToast('Fill in all fields', true);
    const res = await fetch('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone, message }) });
    const data = await res.json();
    if (data.success) { showToast('Message sent!'); document.getElementById('send-msg').value = ''; }
    else showToast(data.error || 'Failed to send', true);
  }
  async function scheduleMsg() {
    const phone = document.getElementById('sched-phone').value.trim();
    const message = document.getElementById('sched-msg').value.trim();
    const send_at = document.getElementById('sched-time').value;
    if (!phone || !message || !send_at) return showToast('Fill in all fields', true);
    const res = await fetch('/api/schedule', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone, message, send_at }) });
    const data = await res.json();
    if (data.success) { showToast('Message scheduled!'); document.getElementById('sched-msg').value = ''; loadJobs(); }
    else showToast(data.error || 'Failed to schedule', true);
  }
  async function loadJobs() {
    const res = await fetch('/api/jobs');
    const jobs = await res.json();
    const list = document.getElementById('jobs-list');
    if (!jobs.length) { list.innerHTML = '<div class="empty">No scheduled messages</div>'; return; }
    list.innerHTML = jobs.map(j => `
      <div class="job-item">
        <div class="job-info">
          <div class="job-phone">${j.args[0]}</div>
          <div class="job-msg">${j.args[1]}</div>
          <div class="job-time">⏰ ${j.next_run}</div>
        </div>
        <button class="delete-btn" onclick="deleteJob('${j.id}')">CANCEL</button>
      </div>`).join('');
  }
  async function deleteJob(id) {
    await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
    showToast('Job cancelled');
    loadJobs();
  }
  checkStatus();
  setInterval(checkStatus, 5000);
  loadJobs();
  setInterval(loadJobs, 10000);
</script>
</body>
</html>
